<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Global Democracy Monitor — All 193 UN Member States</title>
<meta name="description" content="Live global democracy tracking for all 193 UN member states. V-Dem 2025, Freedom House 2025, RSF 2025, EIU 2024, Mo Ibrahim 2024. AI-powered news, erosion analysis, and leader biographies."/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>
:root{
  --ink:#030812;--ink2:#050f1e;--ink3:#0d1628;--ink4:#16233a;--fog:#2a3a56;
  --mist:#546080;--smoke:#7a8ab0;--silver:#a8b4cc;--chalk:#d4dae8;--white:#f8f9fd;
  --gold:#c8a84b;--gold2:#e6c86a;
  --em3:#4dcc8a;--am3:#f5b544;--cr3:#f05050;--sa3:#5588ee;
  --em-bg:rgba(26,122,74,.15);--am-bg:rgba(160,96,16,.15);--cr-bg:rgba(139,26,26,.15);--sa-bg:rgba(26,58,122,.2);
  --serif:'Playfair Display',serif;--body:'Lora',Georgia,serif;--mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--chalk);font-family:var(--body);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--ink2)}::-webkit-scrollbar-thumb{background:var(--fog);border-radius:3px}
button{cursor:pointer;font-family:var(--mono)}input,select{font-family:var(--mono);font-size:12px}
a{color:var(--sa3);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1920px;margin:0 auto;padding:0 14px}

/* MASTHEAD */
.mhd{background:linear-gradient(180deg,#060912,var(--ink2));border-bottom:1px solid var(--fog);padding:12px 18px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 40px rgba(0,0,0,.9)}
.mhd-top{max-width:1920px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.brand h1{font-family:var(--serif);font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em}
.brand h1 em{font-style:normal;color:var(--gold)}
.brand-sub{font-family:var(--mono);font-size:9px;color:var(--mist);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.hdr-pills{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding-bottom:6px}
.pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--smoke)}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav{display:flex;max-width:1920px;margin:0 auto}
.ntab{padding:9px 17px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:transparent;border:none;color:var(--mist);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.ntab:hover{color:var(--chalk)}.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:5px;padding:5px 11px;cursor:pointer;border:1px solid;transition:all .2s}
.bg{background:rgba(200,168,75,.1);border-color:var(--gold);color:var(--gold2)}.bg:hover{background:rgba(200,168,75,.2)}
.bb{background:rgba(26,58,122,.2);border-color:#2255b8;color:var(--sa3)}.bb:hover{background:rgba(26,58,122,.35)}
.br{background:rgba(139,26,26,.2);border-color:#c22222;color:var(--cr3)}.br:hover{background:rgba(139,26,26,.35)}
.bgh{background:transparent;border-color:var(--fog);color:var(--smoke)}.bgh:hover{color:var(--chalk)}
.bsm{padding:3px 7px;font-size:9px}

/* FILTERS */
.fbar{background:var(--ink2);border:1px solid var(--ink4);border-radius:8px;padding:9px 13px;margin-bottom:11px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.flbl{font-family:var(--mono);font-size:9px;color:var(--mist);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.fsel,.finp{background:var(--ink);border:1px solid var(--ink4);border-radius:5px;color:var(--chalk);padding:4px 8px;outline:none;transition:border-color .2s;font-family:var(--mono);font-size:11px}
.fsel:focus,.finp:focus{border-color:var(--gold)}.finp{width:190px}.finp::placeholder{color:var(--mist)}
.rct{font-family:var(--mono);font-size:10px;color:var(--mist);margin-left:auto}

/* TABLE */
.twrap{overflow-x:auto;border-radius:8px;border:1px solid var(--ink4);max-height:calc(100vh - 200px)}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
thead{position:sticky;top:0;z-index:10}
th{background:var(--ink);padding:8px 9px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mist);border-bottom:1px solid var(--fog);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--chalk)}.thon{color:var(--gold)!important}
.dr{transition:background .1s;cursor:pointer}
.dr:nth-child(odd){background:#080d1c}.dr:nth-child(even){background:var(--ink2)}.dr:hover{background:var(--ink3)!important}
td{padding:6px 9px;border-bottom:1px solid var(--ink4);vertical-align:middle}
.tdc{border-left:3px solid;font-weight:700;color:var(--white);white-space:nowrap}
.tl{color:var(--chalk);cursor:pointer;border-bottom:1px dotted var(--fog)}.tl:hover{color:var(--gold2);border-bottom-color:var(--gold)}

/* BADGES */
.bdg{display:inline-block;border-radius:3px;padding:2px 6px;font-family:var(--mono);font-size:10px;font-weight:700;white-space:nowrap;border:1px solid}
.bF{background:var(--em-bg);color:var(--em3);border-color:rgba(26,122,74,.4)}
.bPF{background:var(--am-bg);color:var(--am3);border-color:rgba(160,96,16,.4)}
.bNF{background:var(--cr-bg);color:var(--cr3);border-color:rgba(139,26,26,.4)}
.bFD{background:var(--sa-bg);color:#6ba3f5;border-color:rgba(26,58,122,.5)}
.bFlD{background:rgba(34,100,80,.2);color:#5dd4a8;border-color:rgba(34,100,80,.5)}
.bHR{background:rgba(120,60,0,.2);color:#f0a860;border-color:rgba(120,60,0,.5)}
.bAuth{background:var(--cr-bg);color:var(--cr3);border-color:rgba(139,26,26,.5)}
.blow{background:var(--em-bg);color:var(--em3);border-color:rgba(26,122,74,.4)}
.bmed{background:var(--am-bg);color:var(--am3);border-color:rgba(160,96,16,.4)}
.bhigh{background:rgba(180,80,0,.15);color:#f07840;border-color:rgba(180,80,0,.4)}
.bcrit{background:var(--cr-bg);color:var(--cr3);border-color:rgba(139,26,26,.4)}

/* SCORE BAR */
.sbw{display:flex;align-items:center;gap:5px}
.sbn{font-family:var(--mono);font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
.sbt{height:4px;border-radius:2px;background:var(--ink4);flex:1;min-width:40px;overflow:hidden}
.sbf{height:100%;border-radius:2px}

/* TRENDS */
.tup{color:#4dcc8a;font-size:14px;font-weight:700}
.tstb{color:var(--mist);font-size:14px}
.tdn{color:#f07840;font-size:14px;font-weight:700}
.tcr{color:#f05050;font-size:14px;font-weight:700}

/* EROSION CELL */
.erow{list-style:none;display:flex;flex-direction:column;gap:3px;max-width:200px}
.ei{font-family:var(--mono);font-size:9px;color:var(--silver);padding:2px 5px;background:rgba(139,26,26,.08);border-left:2px solid #c22222;border-radius:0 3px 3px 0;line-height:1.4}
.mbt{font-family:var(--mono);font-size:9px;color:var(--sa3);background:none;border:none;cursor:pointer;padding:2px 0}.mbt:hover{color:var(--gold)}

/* NEWS CELL */
.ncw{max-width:180px}
.nhl{font-size:11px;color:var(--chalk);line-height:1.4;margin-bottom:2px;cursor:pointer}.nhl:hover{color:var(--gold2)}
.nmt{font-family:var(--mono);font-size:9px;color:var(--mist)}.nsrc{color:var(--sa3)}
.nld{font-family:var(--mono);font-size:10px;color:var(--mist);animation:bth 1.5s infinite}
@keyframes bth{0%,100%{opacity:.3}50%{opacity:1}}
.lnb{background:rgba(26,58,122,.15);border:1px solid rgba(85,136,238,.3);color:var(--sa3);border-radius:4px;padding:3px 7px;font-family:var(--mono);font-size:9px;cursor:pointer}.lnb:hover{background:rgba(26,58,122,.3)}

/* PANEL */
.ovl{position:fixed;inset:0;background:rgba(4,7,18,.87);backdrop-filter:blur(6px);z-index:500;display:flex;justify-content:flex-end;animation:fdi .2s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.panel{width:560px;max-width:96vw;height:100vh;background:var(--ink2);border-left:1px solid var(--fog);overflow-y:auto;display:flex;flex-direction:column;animation:sli .25s ease}
@keyframes sli{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.ph{padding:18px;border-bottom:1px solid var(--ink4);background:var(--ink);position:sticky;top:0;z-index:10}
.ptit{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--white);line-height:1.2}
.psub{font-family:var(--mono);font-size:10px;color:var(--mist);margin-top:4px}
.pb{padding:18px;flex:1}
.pcl{background:none;border:1px solid var(--fog);color:var(--smoke);border-radius:5px;padding:5px 10px;font-family:var(--mono);font-size:10px;cursor:pointer}.pcl:hover{color:var(--chalk)}
.stit{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--ink4);display:flex;align-items:center;justify-content:space-between}
.igr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.ic{background:var(--ink3);border:1px solid var(--ink4);border-radius:6px;padding:9px 11px}
.ic label{font-family:var(--mono);font-size:9px;color:var(--mist);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:2px}
.ic .v{font-size:12px;color:var(--white);font-weight:600}
.btext{font-family:var(--body);font-size:13px;color:var(--silver);line-height:1.7}
.fac{background:rgba(200,168,75,.05);border:1px solid rgba(200,168,75,.2);border-radius:6px;padding:9px 11px;margin-bottom:6px}
.fat{font-family:var(--body);font-size:12px;color:var(--silver);line-height:1.5}
.edi{background:rgba(139,26,26,.08);border:1px solid rgba(194,34,34,.2);border-left:3px solid #c22222;border-radius:0 6px 6px 0;padding:9px 11px;margin-bottom:7px}
.eti{font-family:var(--serif);font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px}
.edt{font-family:var(--mono);font-size:9px;color:var(--cr3);margin-bottom:4px}
.edx{font-size:12px;color:var(--silver);line-height:1.5}
.npi{background:var(--ink3);border:1px solid var(--ink4);border-radius:6px;padding:11px;margin-bottom:7px}
.nph{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px;line-height:1.4}
.npb{font-size:12px;color:var(--silver);line-height:1.5;margin-bottom:6px}
.npf{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.nps{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--sa3)}
.npd{font-family:var(--mono);font-size:9px;color:var(--mist)}
.tpill{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--ink4);background:transparent;color:var(--mist);cursor:pointer;transition:all .2s}
.tpill.on{background:rgba(200,168,75,.15);border-color:var(--gold);color:var(--gold2)}.tpill:hover:not(.on){color:var(--chalk);border-color:var(--fog)}
.ail{text-align:center;padding:28px 0}
.ail .sp{font-size:26px;animation:spin 2s linear infinite;display:block;margin-bottom:8px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ail p{font-family:var(--mono);font-size:11px;color:var(--mist);animation:bth 1.5s infinite}
.tag{display:inline-block;background:var(--ink4);border-radius:3px;padding:1px 6px;font-family:var(--mono);font-size:9px;color:var(--smoke);letter-spacing:.04em;border:1px solid var(--fog)}

/* DASHBOARD */
.dgr{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px;margin-bottom:16px}
.dc{background:var(--ink2);border:1px solid var(--ink4);border-radius:8px;padding:13px}
.dn{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;margin:4px 0 2px}
.dl{font-family:var(--mono);font-size:9px;color:var(--mist);letter-spacing:.06em;text-transform:uppercase}
.dbar{height:3px;background:var(--ink4);border-radius:2px;margin-top:6px}
.dfil{height:100%;border-radius:2px}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px}
.lc{background:var(--ink2);border:1px solid var(--ink4);border-radius:8px;padding:13px}
.lct{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--ink4)}
.lr{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(35,43,66,.6);font-size:12px}.lr:last-child{border-bottom:none}
.lrk{font-family:var(--mono);font-size:9px;color:var(--mist);width:18px;text-align:right;flex-shrink:0}

/* INTEL */
.ihdr{background:linear-gradient(90deg,rgba(139,26,26,.25),rgba(160,96,16,.15));border:1px solid rgba(194,34,34,.3);border-radius:8px;padding:13px 16px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.itit{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--cr3)}
.isub{font-family:var(--mono);font-size:10px;color:var(--mist);margin-top:3px}
.ac{border-radius:7px;padding:12px 14px;margin-bottom:8px;border-left:4px solid}
.acr{background:rgba(139,26,26,.12);border-color:#c22222;border-top:1px solid rgba(139,26,26,.25);border-right:1px solid rgba(139,26,26,.25);border-bottom:1px solid rgba(139,26,26,.25)}
.ahg{background:rgba(180,80,0,.12);border-color:#e07030;border-top:1px solid rgba(180,80,0,.25);border-right:1px solid rgba(180,80,0,.25);border-bottom:1px solid rgba(180,80,0,.25)}
.amd{background:rgba(160,96,16,.12);border-color:#d4831a;border-top:1px solid rgba(160,96,16,.25);border-right:1px solid rgba(160,96,16,.25);border-bottom:1px solid rgba(160,96,16,.25)}
.alw{background:rgba(26,122,74,.1);border-color:#22a864;border-top:1px solid rgba(26,122,74,.2);border-right:1px solid rgba(26,122,74,.2);border-bottom:1px solid rgba(26,122,74,.2)}
.asv{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:3px;border:1px solid;margin-right:5px}
.asc{background:#2c0a0a;color:var(--cr3);border-color:#c22222}.ash{background:#2c1006;color:#fb923c;border-color:#ea580c}.asm{background:#2d2000;color:#f5b544;border-color:#d4831a}.asl{background:#052e16;color:#4dcc8a;border-color:#16a34a}
.acat{font-family:var(--mono);font-size:9px;color:var(--mist);background:var(--ink4);border:1px solid var(--fog);padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
.aev{font-family:var(--serif);font-size:13px;font-weight:600;color:var(--white);margin:6px 0 3px}
.asum{font-size:12px;color:var(--silver);line-height:1.6}
.adt{font-family:var(--mono);font-size:9px;color:var(--mist)}
.actr{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--sa3);margin-left:5px}

/* SETTINGS */
.sw{max-width:580px;margin:0 auto}
.scard{background:var(--ink2);border:1px solid var(--ink4);border-radius:8px;padding:17px;margin-bottom:13px}
.stit2{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.flbl2{font-family:var(--mono);font-size:10px;color:var(--silver);display:block;margin-bottom:4px}
.finp2{background:var(--ink);border:1px solid var(--ink4);border-radius:5px;color:var(--white);padding:7px 11px;width:100%;outline:none;font-size:13px;font-family:var(--mono);margin-bottom:3px}
.finp2:focus{border-color:var(--gold)}
.fhnt{font-family:var(--mono);font-size:9px;color:var(--mist);line-height:1.5}
.aw2{border-radius:6px;padding:11px;font-size:12px;line-height:1.6;margin-bottom:10px}
.awrn{background:rgba(160,96,16,.12);border:1px solid rgba(160,96,16,.4);color:#f5b544}
.ainf{background:rgba(26,58,122,.15);border:1px solid rgba(26,58,122,.4);color:var(--sa3)}
.srcbar{background:var(--ink2);border:1px solid var(--ink4);border-radius:6px;padding:9px 13px;margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.si{font-family:var(--mono);font-size:9px;color:var(--mist)}.si span{color:var(--smoke)}
.dstamp{font-family:var(--mono);font-size:8px;color:var(--mist);background:var(--ink3);border:1px solid var(--ink4);border-radius:3px;padding:1px 4px}
@media(max-width:768px){.tc2{grid-template-columns:1fr}.panel{width:100vw}.finp{width:100%}.brand h1{font-size:16px}}
</style>

async function callClaude(sys,msg,search=true){
  const key=getKey();if(!key)throw new Error("NO_KEY");
  const body={model:"claude-sonnet-4-20250514",max_tokens:1024,system:sys,messages:[{role:"user",content:msg}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
}
const parseJ=t=>{const m=t.match(/(\[[\s\S]*?\]|\{[\s\S]*?\})/);if(m)try{return JSON.parse(m[0]);}catch{}return null;};

async function fetchNews(country){
  const ck=`gdm_news_${country}`;const cached=getCache(ck);if(cached)return cached;
  const sys=`You are a political news aggregator. Find latest news (last 48h) on democracy, governance, elections, civil rights, or political crisis in the specified country from credible outlets: BBC, Al Jazeera, Reuters, AFP, CNN, France 24, NYT, Guardian, DW, RFI, AP. Return ONLY a JSON array of 3–4 items. No markdown. Each: {headline:string(≤15 words), summary:string(2 sentences), source:string, url:string, date:string}`;
  const t=await callClaude(sys,`Find latest political/democracy news for ${country} from the past 48 hours. JSON array only.`);
  const d=parseJ(t);if(d){setCache(ck,d,NEWS_TTL);return d;}throw new Error("Parse failed");
}

  const sys=`You are a political encyclopedia. Return ONLY a JSON object. No markdown. Provide: {bio:string(3–4 sentences), keyFacts:string[](4 interesting verified facts), significance:string(2 sentences)}`;
  const t=await callClaude(sys,`Provide factual information about ${type}: "${subject}" from ${country}. Return JSON only.`,false);
  const d=parseJ(t);if(d){setCache(ck,d,7*24*60*60*1000);return d;}throw new Error("Parse failed");
}

/* ── ScoreBar ── */
function ScoreBar({val,max=1}){
  const pct=Math.min(100,Math.round((val/max)*100));
  const col=max===1?SCOL(val):SCOL(val/max);
  const disp=max===1?val.toFixed(2):val;
  return <div className="sbw"><span className="sbn" style={{color:col}}>{disp}</span><div className="sbt"><div className="sbf" style={{width:pct+"%",background:col}}/></div></div>;
}

/* ── NewsCell (inline) ── */
function NewsCell({country,onShowFull}){
  const [s,ss]=useState({loading:false,items:null,err:null});
  const key=getKey();
  useEffect(()=>{const c=getCache(`gdm_news_${country}`);if(c)ss({loading:false,items:c,err:null});},[country]);
  const load=useCallback(async()=>{
    if(!key){ss({loading:false,items:null,err:"Set API key"});return;}
    ss({loading:true,items:null,err:null});
    try{const d=await fetchNews(country);ss({loading:false,items:d,err:null});}
    catch(e){ss({loading:false,items:null,err:e.message==="NO_KEY"?"Set API key":"Fetch failed"});}
  },[country,key]);
  if(s.loading)return <span className="nld">Searching…</span>;
  if(!s.items&&!s.err)return <button className="lnb" onClick={load}>Load news</button>;
  if(s.err)return <div style={{display:"flex",gap:5,alignItems:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--cr3)"}}>{s.err}</span>{key&&<button className="lnb" onClick={load}>↺</button>}</div>;
  const top=s.items?.[0];if(!top)return null;
  return <div className="ncw">
    <div className="nhl" onClick={()=>onShowFull(s.items)}>{top.headline}</div>
    <div className="nmt"><span className="nsrc">{top.source}</span> · {top.date}</div>
    {s.items.length>1&&<button className="lnb" style={{marginTop:4}} onClick={()=>onShowFull(s.items)}>+{s.items.length-1} more</button>}
  </div>;
}

/* ── LEADERS TABLE ── */
function LeadersTable(){
  const [q,setQ]=useState("");
  const [reg,setReg]=useState("All");
  const [fhF,setFhF]=useState("All");
  const [eiuF,setEiuF]=useState("All");
  const [erF,setErF]=useState("All");
  const [trF,setTrF]=useState("All");
  const [sk,setSk]=useState("country");
  const [sd,setSd]=useState("asc");
  const [panel,setPanel]=useState(null);
  const [demo,setDemo]=useState(false);

  const filtered=useMemo(()=>{
    let d=COUNTRIES;
    if(reg!=="All")d=d.filter(c=>c.region===reg);
    if(fhF!=="All"){const m={Free:"F","Partly Free":"PF","Not Free":"NF"};d=d.filter(c=>c.fhStatus===m[fhF]);}
    if(eiuF!=="All"){const m={"Full Democracy":"FD","Flawed Democracy":"FlD","Hybrid Regime":"HR","Authoritarian":"Auth"};d=d.filter(c=>c.eiuCat===m[eiuF]);}
    if(erF!=="All")d=d.filter(c=>c.erosion===erF);
    if(trF!=="All")d=d.filter(c=>c.trend===trF);
    if(q.trim()){const ql=q.toLowerCase();d=d.filter(c=>c.country.toLowerCase().includes(ql)||c.leader.toLowerCase().includes(ql)||c.party.toLowerCase().includes(ql)||c.system.toLowerCase().includes(ql)||c.region.toLowerCase().includes(ql));}
    return [...d].sort((a,b)=>{
      let av=a[sk]??"",bv=b[sk]??"";
      if(typeof av==="string")av=av.toLowerCase();if(typeof bv==="string")bv=bv.toLowerCase();
      return(av<bv?-1:av>bv?1:0)*(sd==="asc"?1:-1);
    });
  },[q,reg,fhF,eiuF,erF,trF,sk,sd]);

  const sort=k=>{if(sk===k)setSd(d=>d==="asc"?"desc":"asc");else{setSk(k);setSd("asc");}};
  const SA=({k})=><span style={{marginLeft:2,opacity:sk===k?1:.25,fontSize:8}}>{sk===k?(sd==="asc"?"▲":"▼"):"⇅"}</span>;

  return <>
    <div className="fbar">
      <input className="finp" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search country, leader, party, region…"/>
      {[{l:"Region",items:REGIONS,v:reg,set:setReg,acc:"#0891b2"},{l:"FH Status",items:FH_OPTS,v:fhF,set:setFhF,acc:"#4dcc8a"},{l:"Democracy",items:EIU_OPTS,v:eiuF,set:setEiuF,acc:"#5588ee"},{l:"Erosion",items:EROS_OPTS,v:erF,set:setErF,acc:"#f05050"},{l:"Trend",items:TREND_OPTS,v:trF,set:setTrF,acc:"#f5b544"}].map(f=>
        <div key={f.l} style={{display:"flex",alignItems:"center",gap:5}}>
          <span className="flbl" style={{color:f.acc}}>{f.l}</span>
          <select className="fsel" value={f.v} onChange={e=>f.set(e.target.value)} style={{borderColor:f.v!=="All"?f.acc+"55":undefined,color:f.v!=="All"?f.acc:undefined}}>
            {f.items.map(i=><option key={i}>{i}</option>)}
          </select>
        </div>)}
      <button className="btn" style={{background:demo?"rgba(26,58,122,.25)":"transparent",borderColor:demo?"#2255b8":"var(--fog)",color:demo?"var(--sa3)":"var(--smoke)"}} onClick={()=>setDemo(v=>!v)}>

            <th onClick={()=>sort("spectrum")} className={sk==="spectrum"?"thon":""}>Spectrum<SA k="spectrum"/></th>
          </>}

                <td><span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:RSFCOL(c.rsf)}}>#{c.rsf||"N/A"}</span></td>
                <td><span className={TRND[c.trend]?.c} style={{fontSize:16}}>{TRND[c.trend]?.i}</span></td>
                <td><span className={`bdg ${EROC[c.erosion]}`} style={{textTransform:"capitalize",fontSize:9}}>{c.erosion}</span></td>

    </div>
    {panel&&<Panel c={panel.c} initTab={panel.tab} newsItems={panel.newsItems} onClose={()=>setPanel(null)}/>}
  </>;

  const topLdi=[...all].sort((a,b)=>b.vdem_ldi-a.vdem_ldi).slice(0,15);
  const botLdi=[...all].sort((a,b)=>a.vdem_ldi-b.vdem_ldi).slice(0,15);
  const botRsf=[...all].filter(c=>c.rsf>0).sort((a,b)=>b.rsf-a.rsf).slice(0,12);
  const declining=all.filter(c=>c.trend==="down"||c.trend==="crisis");

    {l:"Full Democracies",v:cnt(c=>c.eiuCat==="FD"),col:"#6ba3f5",bg:"rgba(26,58,122,.2)"},
    {l:"Flawed Democracies",v:cnt(c=>c.eiuCat==="FlD"),col:"#5dd4a8",bg:"rgba(34,100,80,.15)"},
    {l:"Hybrid Regimes",v:cnt(c=>c.eiuCat==="HR"),col:"#f0a860",bg:"rgba(120,60,0,.15)"},
    {l:"Authoritarian States",v:cnt(c=>c.eiuCat==="Auth"),col:"#f05050",bg:"rgba(139,26,26,.15)"},
    {l:"Free (FH 2025)",v:cnt(c=>c.fhStatus==="F"),col:"#4dcc8a",bg:"rgba(26,122,74,.15)"},
    {l:"Partly Free",v:cnt(c=>c.fhStatus==="PF"),col:"#f5b544",bg:"rgba(160,96,16,.15)"},
    {l:"Not Free",v:cnt(c=>c.fhStatus==="NF"),col:"#f05050",bg:"rgba(139,26,26,.15)"},
    {l:"Critical Erosion",v:cnt(c=>c.erosion==="critical"),col:"#ef4444",bg:"rgba(139,26,26,.2)"},
    {l:"Declining / Crisis",v:declining.length,col:"#f07840",bg:"rgba(180,80,0,.15)"},
    {l:"Improving",v:cnt(c=>c.trend==="up"),col:"#4dcc8a",bg:"rgba(26,122,74,.15)"},
  ];

  return <div>
    <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mist)",marginBottom:13,letterSpacing:".07em"}}>
      {n} COUNTRIES TRACKED · V-DEM 2025 · FREEDOM HOUSE 2025 · RSF 2025 · EIU 2024 · MO IBRAHIM 2024
    </div>
    <div style={{background:"var(--ink2)",border:"1px solid var(--ink4)",borderRadius:8,padding:"13px",marginBottom:14}}>
      <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)",marginBottom:5,letterSpacing:".07em"}}>GLOBAL AVERAGE V-DEM LIBERAL DEMOCRACY INDEX 2025</div>
      <ScoreBar val={parseFloat(avgLdi)} max={1}/>
      <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)",marginTop:3}}>Global mean: {avgLdi} / 1.00 · Scale: 0 (no democracy) → 1 (full liberal democracy) · Source: V-Dem 2025</div>
    </div>
    <div className="dgr">
      {cards.map(card=><div key={card.l} className="dc" style={{background:card.bg,borderColor:card.col+"33"}}>
        <div className="dl">{card.l}</div>
        <div className="dn" style={{color:card.col}}>{card.v}</div>
        <div className="dbar"><div className="dfil" style={{width:`${(card.v/n*100).toFixed(0)}%`,background:card.col}}/></div>
        <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)",marginTop:3}}>{((card.v/n)*100).toFixed(1)}%</div>
      </div>)}
    </div>
    <div className="tc2">
      <div className="lc">
        <div className="lct" style={{color:"#4dcc8a"}}>🏆 TOP 15 — V-DEM LDI 2025</div>
        {topLdi.map((c,i)=><div key={c.id} className="lr">
          <span className="lrk">#{i+1}</span>
          <span style={{fontSize:12}}>{c.flag}</span>
          <span style={{flex:1,fontSize:11,color:"var(--chalk)"}}>{c.country}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:SCOL(c.vdem_ldi)}}>{c.vdem_ldi.toFixed(2)}</span>
        </div>)}
      </div>
      <div className="lc">
        <div className="lct" style={{color:"#f05050"}}>⚠ BOTTOM 15 — V-DEM LDI 2025</div>
        {botLdi.map((c,i)=><div key={c.id} className="lr">
          <span className="lrk">#{i+1}</span>
          <span style={{fontSize:12}}>{c.flag}</span>
          <span style={{flex:1,fontSize:11,color:"var(--chalk)"}}>{c.country}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:SCOL(c.vdem_ldi)}}>{c.vdem_ldi.toFixed(2)}</span>
          <span className={`bdg ${EROC[c.erosion]}`} style={{fontSize:8}}>{c.erosion}</span>
        </div>)}
      </div>
      <div className="lc">
        <div className="lct" style={{color:"#f07840"}}>↓ DECLINING & CRISIS DEMOCRACIES ({declining.length})</div>
        {declining.map(c=><div key={c.id} className="lr">
          <span style={{fontSize:12}}>{c.flag}</span>
          <span style={{flex:1,fontSize:11,color:"var(--chalk)"}}>{c.country}</span>
          <span className={TRND[c.trend]?.c} style={{marginLeft:"auto",fontSize:15}}>{TRND[c.trend]?.i}</span>
          <span className={`bdg ${FHM[c.fhStatus]?.c}`} style={{fontSize:9}}>{FHM[c.fhStatus]?.l}</span>
        </div>)}
      </div>
      <div className="lc">
        <div className="lct" style={{color:"#f0a860"}}>📰 WORST PRESS FREEDOM (RSF 2025)</div>
        {botRsf.map(c=><div key={c.id} className="lr">
          <span className="lrk">#{c.rsf}</span>
          <span style={{fontSize:12}}>{c.flag}</span>
          <span style={{flex:1,fontSize:11,color:"var(--chalk)"}}>{c.country}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:RSFCOL(c.rsf)}}>{c.region}</span>
        </div>)}
      </div>
    </div>
    {/* Regional */}
    <div className="lc" style={{marginBottom:14}}>
      <div className="lct" style={{color:"var(--gold)"}}>🌏 REGIONAL BREAKDOWN (Freedom House 2025)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10,marginTop:10}}>
        {REGIONS.slice(1).map(reg=>{
          const rc=COUNTRIES.filter(c=>c.region===reg);
          if(!rc.length)return null;
          const avgL=(rc.reduce((s,c)=>s+c.vdem_ldi,0)/rc.length).toFixed(2);
          const rcol=RC[reg]||"#4b5563";
          return <div key={reg} style={{background:"var(--ink3)",borderRadius:8,padding:"11px",borderLeft:`3px solid ${rcol}`}}>
            <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:rcol,marginBottom:6}}>{reg} ({rc.length})</div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mist)",lineHeight:2}}>
              <div>Avg V-Dem: <strong style={{color:SCOL(parseFloat(avgL))}}>{avgL}</strong></div>
              <div>Free: <strong style={{color:"#4dcc8a"}}>{rc.filter(c=>c.fhStatus==="F").length}</strong> · PF: <strong style={{color:"#f5b544"}}>{rc.filter(c=>c.fhStatus==="PF").length}</strong> · NF: <strong style={{color:"#f05050"}}>{rc.filter(c=>c.fhStatus==="NF").length}</strong></div>
              <div>Critical: <strong style={{color:"#ef4444"}}>{rc.filter(c=>c.erosion==="critical").length}</strong> · Declining: <strong style={{color:"#f07840"}}>{rc.filter(c=>c.trend==="down"||c.trend==="crisis").length}</strong></div>
            </div>
          </div>;
        })}
      </div>
    </div>
    {/* Mo Ibrahim Africa */}
    <div className="lc">
      <div className="lct" style={{color:"#b45309"}}>🌍 MO IBRAHIM GOVERNANCE INDEX 2024 (Africa — 54 countries)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:7,marginTop:8}}>
        {COUNTRIES.filter(c=>c.ibrahim!==null).sort((a,b)=>b.ibrahim-a.ibrahim).map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 7px",background:"var(--ink3)",borderRadius:5}}>
          <span style={{fontSize:12}}>{c.flag}</span>
          <span style={{flex:1,fontSize:11,color:"var(--chalk)"}}>{c.country}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:SCOL(c.ibrahim/100)}}>{c.ibrahim}</span>
        </div>)}
      </div>
    </div>
  </div>;
}

/* ── INTELLIGENCE ── */
function Intelligence(){
  const [state,ss]=useState({loading:false,alerts:null,err:null,ts:null});
  const key=getKey();
  const load=useCallback(async()=>{
    if(!key){ss(s=>({...s,err:"Add API key in Settings"}));return;}
    ss({loading:true,alerts:null,err:null,ts:null});
    try{const d=await fetchIntel();ss({loading:false,alerts:d,err:null,ts:new Date().toLocaleString()});}
    catch(e){ss({loading:false,alerts:null,err:"Scan failed: "+e.message,ts:null});}
  },[key]);
  useEffect(()=>{if(key)load();},[]);

  const sorted=state.alerts?[...state.alerts].sort((a,b)=>["critical","high","medium","low"].indexOf(a.severity)-["critical","high","medium","low"].indexOf(b.severity)):[];
  const SC={critical:"acr",high:"ahg",medium:"amd",low:"alw"};
  const SS={critical:"asc",high:"ash",medium:"asm",low:"asl"};

  return <div>
    <div className="ihdr">
      <div>
        <div className="itit">🔴 DEMOCRATIC EROSION INTELLIGENCE BRIEFING</div>
        <div className="isub">AI-powered · Live web search · BBC · Al Jazeera · Reuters · AFP · CNN · France 24 · NYT · Guardian · DW · 6h cache</div>
        {state.ts&&<div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)",marginTop:3}}>Last scan: {state.ts}</div>}
      </div>
      <button className="btn br" onClick={load} disabled={state.loading}>{state.loading?"⏳ Scanning…":"↺ Live Scan"}</button>
    </div>
    {!key&&<div className="aw2 awrn" style={{marginBottom:13}}>Add your Anthropic API key in <strong>Settings ⚙</strong> to enable live intelligence scans.</div>}
    {state.loading&&<div className="ail"><span className="sp">🌐</span><p>Scanning global news for democratic erosion events…</p></div>}
    {state.err&&<div style={{background:"rgba(139,26,26,.15)",border:"1px solid #c22222",borderRadius:8,padding:"13px",color:"var(--cr3)",fontFamily:"var(--mono)",fontSize:12,textAlign:"center",marginBottom:12}}>{state.err}</div>}
    {sorted.length>0&&<>
      <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:11}}>
        {["critical","high","medium","low"].map(sv=>{const cnt=sorted.filter(a=>a.severity===sv).length;return cnt>0&&<div key={sv} style={{display:"flex",alignItems:"center",gap:5,background:`${SEV_COL[sv]}11`,border:`1px solid ${SEV_COL[sv]}33`,borderRadius:5,padding:"3px 9px"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:SEV_COL[sv],display:"inline-block"}}/>
          <span style={{fontFamily:"var(--mono)",fontSize:9,fontWeight:700,color:SEV_COL[sv],textTransform:"uppercase",letterSpacing:".08em"}}>{sv}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mist)"}}>{cnt}</span>
        </div>;})}
        <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mist)",marginLeft:"auto",alignSelf:"center"}}>{sorted.length} events · {state.ts}</span>
      </div>
      {sorted.map((a,i)=><div key={i} className={`ac ${SC[a.severity]}`}>
        <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:5,marginBottom:5}}>
          <span style={{fontSize:15}}>{CAT_ICO[a.category]||"📌"}</span>
          <span className={`asv ${SS[a.severity]}`}>{a.severity}</span>
          <span className="acat">{a.category?.replace("_"," ")}</span>
          <span className="actr">{a.country}</span>
          <span className="adt" style={{marginLeft:"auto"}}>{a.date}</span>
        </div>
        <div className="aev">{a.event}</div>
        <div className="asum">{a.summary}</div>
      </div>)}
      <div style={{marginTop:9,padding:"7px 11px",background:"var(--ink2)",border:"1px solid var(--ink4)",borderRadius:5}}>
        <span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)"}}>⚠ AI-generated from live web search. Cross-reference: V-Dem · Freedom House · RSF · Human Rights Watch · Amnesty International before academic citation.</span>
      </div>
    </>}
  </div>;
}

/* ── SETTINGS ── */
function Settings(){
  const [local,setLocal]=useState(getKey());
  const [saved,setSaved]=useState(false);
  const save=()=>{setKey(local);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const clear=()=>{setKey("");setLocal("");};
  const clearC=()=>{Object.keys(localStorage).filter(k=>k.startsWith("gdm_")).forEach(k=>localStorage.removeItem(k));alert("All cache cleared.");};

  return <div className="sw">
    <div className="aw2 awrn">
      <strong>⚠ Security:</strong> Your API key is stored only in your browser's localStorage and sent directly to Anthropic's API only. Never share your key. For public deployment, use a serverless proxy function to hide the key server-side.
    </div>
    <div className="scard">
      <div className="stit2">ANTHROPIC API KEY</div>
      <label className="flbl2">API Key (required for live news, intelligence, AI biographies)</label>
      <input type="password" className="finp2" value={local} onChange={e=>setLocal(e.target.value)} placeholder="sk-ant-…"/>
      <div className="fhnt">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Powers live country news (12h cache), intelligence briefings (6h cache), and AI-expanded biographies (7-day cache) for all {COUNTRIES.length} countries.</div>
      <div style={{display:"flex",gap:7,marginTop:9}}>
        <button className="btn bg" onClick={save}>{saved?"✓ Saved!":"Save Key"}</button>
        {getKey()&&<button className="btn bgh" onClick={clear}>Clear Key</button>}
        <button className="btn bgh" onClick={clearC}>Clear Cache</button>
      </div>
    </div>
    <div className="scard">
      <div className="stit2">DATA SOURCES & METHODOLOGY</div>
      {[
        {n:"V-Dem 2025",d:"Varieties of Democracy — Liberal Democracy Index (LDI), Electoral Democracy Index. 0–1 scale. 202 countries.",u:"https://v-dem.net"},
        {n:"Freedom House 2025",d:"Freedom in the World — Score (0–100), Free/Partly Free/Not Free status. Published Feb 2025.",u:"https://freedomhouse.org"},
        {n:"RSF Press Freedom Index 2025",d:"Reporters Without Borders — Press freedom rank (1–180) and score. Published May 2025.",u:"https://rsf.org"},
        {n:"EIU Democracy Index 2024",d:"Economist Intelligence Unit — Score (0–10), 4-category classification (FD/FlD/HR/Auth).",u:"https://eiu.com"},
        {n:"Mo Ibrahim Foundation 2024",d:"Ibrahim Index of African Governance (IIAG) — Governance score for 54 African countries.",u:"https://mo.ibrahim.foundation"},
      ].map(s=><div key={s.n} style={{background:"var(--ink3)",border:"1px solid var(--ink4)",borderRadius:6,padding:"9px 11px",marginBottom:7}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
          <div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--chalk)",marginBottom:2}}>{s.n}</div>
            <div style={{fontSize:11,color:"var(--silver)",lineHeight:1.5}}>{s.d}</div>
          </div>
          <a href={s.u} target="_blank" rel="noopener noreferrer" style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--sa3)",whiteSpace:"nowrap",flexShrink:0}}>Visit →</a>
        </div>
      </div>)}
    </div>
    <div className="scard">
      <div className="stit2">COVERAGE: {COUNTRIES.length} COUNTRIES</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:9,marginTop:6}}>
        {REGIONS.slice(1).map(r=>{const n=COUNTRIES.filter(c=>c.region===r).length;const rcol=RC[r]||"#4b5563";return <div key={r} style={{background:"var(--ink3)",borderRadius:6,padding:"9px 11px",borderLeft:`3px solid ${rcol}`}}>
          <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:rcol}}>{r}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:rcol,margin:"3px 0"}}>{n}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--mist)"}}>countries</div>
        </div>;})}
      </div>
    </div>
    <div className="scard">
      <div className="stit2">DEPLOYMENT (MAKE THIS WEBSITE PUBLIC)</div>
      <div className="aw2 ainf">
        <strong>To publish as a public website in 30 seconds:</strong><br/>
        1. Download this HTML file<br/>
        2. Go to <a href="https://app.netlify.com/drop" target="_blank">app.netlify.com/drop</a><br/>
        3. Drag and drop the file — you get a live public URL instantly<br/>
        4. For a custom domain: configure DNS to point to Netlify<br/>
        5. <strong>For public API access without exposing keys:</strong> Create a Netlify Function as a proxy so your API key stays server-side — visitors use your proxy, not their own key<br/>
        6. <strong>Alternative hosting:</strong> GitHub Pages, Vercel, Cloudflare Pages (all free)
      </div>
    </div>
  </div>;
}

/* ── ROOT APP ── */
function App(){
  const [tab,setTab]=useState("leaders");
  const all=COUNTRIES;
  const pills=[
    {c:"#4dcc8a",l:`${all.filter(c=>c.fhStatus==="F").length} Free`},
    {c:"#f5b544",l:`${all.filter(c=>c.fhStatus==="PF").length} Partly Free`},
    {c:"#f05050",l:`${all.filter(c=>c.fhStatus==="NF").length} Not Free`},
    {c:"#ef4444",l:`${all.filter(c=>c.erosion==="critical").length} Critical Risk`},
    {c:"#f07840",l:`${all.filter(c=>c.trend==="down"||c.trend==="crisis").length} Declining`},
    {c:"#4dcc8a",l:`${all.filter(c=>c.trend==="up").length} Improving`},
  ];

  return <>
    <div className="mhd">
      <div className="mhd-top wrap">
        <div className="brand">
          <h1>Global <em>Democracy</em> Monitor</h1>
          <div className="brand-sub">All 193 UN Member States + Taiwan · V-Dem 2025 · Freedom House 2025 · RSF 2025 · EIU 2024 · Mo Ibrahim 2024</div>
        </div>
        <div className="hdr-pills">
          {pills.map(p=><div key={p.l} className="pill"><span className="pdot" style={{background:p.c}}/>{p.l}</div>)}
          {!getKey()&&<button className="btn bgh bsm" style={{marginLeft:4}} onClick={()=>setTab("settings")}>⚙ API Key</button>}
        </div>
      </div>
      <div className="nav wrap">
        {[{id:"leaders",l:"🌐 World Leaders"},{id:"dashboard",l:"📊 Dashboard"},{id:"intel",l:"🔴 Intelligence"},{id:"settings",l:"⚙ Settings"}].map(t=>
          <button key={t.id} className={`ntab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </div>
    </div>
    <div className="wrap" style={{paddingTop:14,paddingBottom:40}}>
      {tab==="leaders"&&<LeadersTable/>}
      {tab==="dashboard"&&<Dashboard/>}
      {tab==="intel"&&<Intelligence/>}
      {tab==="settings"&&<Settings/>}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
